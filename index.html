<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor MPO - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">Monitor MPO</h1>
                <p class="text-slate-500">Requerimentos pendentes de resposta ou designação</p>
            </div>
            <button onclick="exportCSV()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">
                <i class="fa-solid fa-download mr-2"></i> Exportar CSV
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8" id="kpis">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center">
                <div class="bg-blue-100 text-blue-600 p-4 rounded-lg mr-4"><i class="fa-solid fa-file-lines text-xl"></i></div>
                <div><p class="text-sm text-slate-500">Total RICs</p><p class="text-2xl font-bold" id="kpi-total">-</p></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center">
                <div class="bg-green-100 text-green-600 p-4 rounded-lg mr-4"><i class="fa-solid fa-users text-xl"></i></div>
                <div><p class="text-sm text-slate-500">Parlamentares</p><p class="text-2xl font-bold" id="kpi-autores">-</p></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center">
                <div class="bg-purple-100 text-purple-600 p-4 rounded-lg mr-4"><i class="fa-solid fa-tags text-xl"></i></div>
                <div><p class="text-sm text-slate-500">Temas</p><p class="text-2xl font-bold" id="kpi-temas">-</p></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center">
                <div class="bg-amber-100 text-amber-600 p-4 rounded-lg mr-4"><i class="fa-solid fa-gavel text-xl"></i></div>
                <div><p class="text-sm text-slate-500">Comissões</p><p class="text-2xl font-bold" id="kpi-comissoes">-</p></div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm"><canvas id="chartTimeline" height="200"></canvas></div>
            <div class="bg-white p-6 rounded-xl shadow-sm"><canvas id="chartAutores" height="200"></canvas></div>
            <div class="bg-white p-6 rounded-xl shadow-sm"><canvas id="chartTemas" height="200"></canvas></div>
            <div class="bg-white p-6 rounded-xl shadow-sm"><canvas id="chartComissoes" height="200"></canvas></div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr><th class="p-4">Proposição</th><th class="p-4">Autor</th><th class="p-4">Status</th><th class="p-4">Ação</th></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function init() {
            const data = await fetch('dados.json').then(r => r.json()).catch(() => ({...}));
            
            document.getElementById('kpi-total').innerText = data.resumo.total;
            document.getElementById('kpi-autores').innerText = data.resumo.autores;
            document.getElementById('kpi-temas').innerText = data.resumo.temas;
            document.getElementById('kpi-comissoes').innerText = data.resumo.comissoes;

            new Chart(document.getElementById('chartTimeline'), { type: 'line', data: { labels: Object.keys(data.timeline), datasets: [{ label: 'Qtd', data: Object.values(data.timeline) }] } });
            new Chart(document.getElementById('chartAutores'), { type: 'bar', data: { labels: Object.keys(data.autores), datasets: [{ label: 'Qtd', data: Object.values(data.autores) }] } });
            new Chart(document.getElementById('chartTemas'), { type: 'pie', data: { labels: Object.keys(data.temas), datasets: [{ data: Object.values(data.temas) }] } });
            new Chart(document.getElementById('chartComissoes'), { type: 'doughnut', data: { labels: Object.keys(data.comissoes), datasets: [{ data: Object.values(data.comissoes) }] } });

            data.lista_requerimentos.forEach(r => {
                document.getElementById('table-body').innerHTML += `<tr><td class="p-4">${r.sigla} ${r.numero}</td><td class="p-4">${r.autor}</td><td class="p-4">${r.status}</td><td class="p-4"><a href="${r.link}" target="_blank">Ver</a></td></tr>`;
            });
        }
        
        function exportCSV() {
            alert("Função de exportação CSV ativada!");
            // Lógica para exportar a tabela para .csv
        }
        window.onload = init;
    </script>
</body>
</html>
