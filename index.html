<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Legislativo MPO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Dashboard Legislativo - MPO</h1>
            <p class="text-gray-600">Monitoramento em tempo real (Atualizado em: <span id="data-atualizacao">-</span>)</p>
        </header>

        <!-- KPIs -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow p-6 border-l-4 border-blue-600">
                <h3 class="text-gray-500 text-sm font-semibold uppercase">Total de Requerimentos</h3>
                <p class="text-3xl font-bold text-gray-800" id="kpi-total">-</p>
            </div>
            <div class="bg-white rounded-xl shadow p-6 border-l-4 border-emerald-500">
                <h3 class="text-gray-500 text-sm font-semibold uppercase">Aprovados / Encaminhados</h3>
                <p class="text-3xl font-bold text-emerald-600" id="kpi-aprovados">-</p>
            </div>
            <div class="bg-white rounded-xl shadow p-6 border-l-4 border-indigo-600">
                <h3 class="text-gray-500 text-sm font-semibold uppercase">Autores Únicos</h3>
                <p class="text-3xl font-bold text-gray-800" id="kpi-autores">-</p>
            </div>
        </div>

        <!-- Filtros e Busca -->
        <div class="bg-white p-4 rounded-xl shadow mb-6 flex flex-wrap gap-4 items-center">
            <input type="text" id="search-input" placeholder="Buscar por número, autor ou tema..." class="border rounded px-4 py-2 w-full md:w-1/3">
            <select id="theme-filter" class="border rounded px-4 py-2">
                <option value="">Todos os Temas</option>
            </select>
        </div>

        <div class="bg-white rounded-xl shadow p-6 mb-8">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Linha do Tempo: Apresentados vs. Aprovados</h2>
            <div class="h-64">
                <canvas id="chart-timeline"></canvas>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <div class="p-6 border-b border-gray-200">
                <h2 class="text-xl font-bold text-gray-800">Requerimentos Detalhados</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Identificação</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Data</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Autor</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Resumo</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="bg-white divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let globalDados = null;

        async function initDashboard() {
            try {
                const response = await fetch('dados.json');
                if (!response.ok) throw new Error();
                globalDados = await response.json();
            } catch (e) {
                globalDados = getMockData();
            }
            renderizar(globalDados);
            setupFilters(globalDados);
        }

        function setupFilters(dados) {
            const select = document.getElementById('theme-filter');
            const temas = new Set(dados.lista_requerimentos.map(r => r.tema));
            temas.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t; opt.innerText = t;
                select.appendChild(opt);
            });

            document.getElementById('search-input').addEventListener('input', filtrar);
            select.addEventListener('change', filtrar);
        }

        function filtrar() {
            const termo = document.getElementById('search-input').value.toLowerCase();
            const tema = document.getElementById('theme-filter').value;
            const filtrados = globalDados.lista_requerimentos.filter(r => 
                (r.ementa.toLowerCase().includes(termo) || r.autor.toLowerCase().includes(termo) || `${r.sigla}${r.numero}`.includes(termo)) &&
                (tema === "" || r.tema === tema)
            );
            renderizarTabela(filtrados);
        }

        function renderizar(dados) {
            document.getElementById('data-atualizacao').innerText = dados.ultima_atualizacao;
            document.getElementById('kpi-total').innerText = dados.resumo.total_requerimentos;
            document.getElementById('kpi-aprovados').innerText = dados.resumo.total_aprovados || 0;
            document.getElementById('kpi-autores').innerText = dados.resumo.total_autores;

            const ctx = document.getElementById('chart-timeline').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dados.timeline.labels,
                    datasets: [
                        { label: 'Apresentados', data: dados.timeline.apresentados, borderColor: '#3b82f6', tension: 0.3 },
                        { label: 'Aprovados', data: dados.timeline.aprovados, borderColor: '#10b981', tension: 0.3 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            renderizarTabela(dados.lista_requerimentos);
        }

        function renderizarTabela(lista) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            lista.forEach(req => {
                const tr = document.createElement('tr');
                const statusStyle = (req.status || '').includes('Aprovado') ? 'bg-emerald-100 text-emerald-800' : 'bg-blue-100 text-blue-800';
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-900">${req.sigla} ${req.numero}/${req.ano}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">${req.data}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${req.autor}</td>
                    <td class="px-6 py-4 text-sm"><span class="px-2 py-1 rounded-full text-xs font-semibold ${statusStyle}">${req.status || 'Em Tramitação'}</span></td>
                    <td class="px-6 py-4 text-sm text-gray-500"><div class="line-clamp-2 max-w-xs">${req.ementa}</div></td>
                    <td class="px-6 py-4 text-right"><a href="${req.link}" target="_blank" class="text-indigo-600 font-bold">Ver RIC</a></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function getMockData() {
            return {
                ultima_atualizacao: "Offline",
                resumo: { total_requerimentos: 1, total_aprovados: 1, total_autores: 1 },
                timeline: { labels: ["Jan/26"], apresentados: [1], aprovados: [1] },
                lista_requerimentos: [{ sigla: "RIC", numero: 1, ano: 2026, data: "10/01/2026", autor: "Dep. Teste", status: "Aprovado / Encaminhado", ementa: "Teste MPO", tema: "Geral / Outros", link: "#" }]
            };
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
